# Application Properties pour test PostgreSQL

# Ce fichier peut être utilisé pour tester la config PostgreSQL en local
# Utilisation: mvn spring-boot:run -Dspring-boot.run.profiles=postgres-local

# PostgreSQL Local Dialect
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# PostgreSQL Connection (Ajuster host/port/credentials selon votre DB local)
spring.datasource.url=jdbc:postgresql://localhost:5432/pharmacie_db
spring.datasource.username=pharmacie_user
spring.datasource.password=password
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA/Hibernate Configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false
spring.sql.init.mode=never

# Postmark Email Service
postmark.api-key=3c6a5f2a-8642-47ac-b90c-34d3e58470ee

# Logging
logging.level.root=INFO
logging.level.pharmacie=DEBUG
logging.level.org.springframework.web=INFO
logging.level.org.postgresql=DEBUG
