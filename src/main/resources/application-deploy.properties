# Profil de deploiement pour Render.com
# PostgreSQL automatiquement cree par Render

# Pour demarrer avec ce profil, executer la commande suivante :
# mvn spring-boot:run -Dspring-boot.run.profiles=deploy

# PostgreSQL Dialect pour optimiser les queries SQL
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# Connection String PostgreSQL depuis Render
# Format: jdbc:postgresql://host:port/database
spring.datasource.url=jdbc:postgresql://${SPRING_DATASOURCE_HOST:localhost}:${SPRING_DATASOURCE_PORT:5432}/${SPRING_DATASOURCE_DB:pharmacie_db}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:pharmacie_user}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:password}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA/Hibernate Configuration
spring.jpa.hibernate.ddl-auto=create
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false
spring.sql.init.mode=never

# Configuration Postmark pour l'envoi de mails en production
postmark.api-key=${POSTMARK_API_KEY:3c6a5f2a-8642-47ac-b90c-34d3e58470ee}

# Logging
logging.level.root=INFO
logging.level.pharmacie=DEBUG
logging.level.org.springframework.web=INFO
logging.level.org.postgresql=WARN